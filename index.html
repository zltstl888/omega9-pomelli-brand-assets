<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>欧米茄九品牌资产 | Omega 9 Brand Assets</title>
  <meta name="description" content="欧米茄九品牌资产网页，包含当前主 logo 和真实产品白底照片，用于 Pomelli 品牌资产识别。">
  <style>
    :root {
      color-scheme: light;
      --ink: #13201b;
      --muted: #66736d;
      --line: #dce4df;
      --paper: #f7faf7;
      --panel: #ffffff;
      --green: #2f6f4e;
      --gold: #b78a33;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--paper);
      color: var(--ink);
      letter-spacing: 0;
    }

    header {
      min-height: 72vh;
      display: grid;
      align-items: center;
      padding: 48px 24px 36px;
      background:
        linear-gradient(120deg, rgba(247, 250, 247, 0.98), rgba(238, 243, 239, 0.94)),
        radial-gradient(circle at 78% 26%, rgba(183, 138, 51, 0.14), transparent 28%);
      border-bottom: 1px solid var(--line);
    }

    .hero {
      width: min(1120px, 100%);
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(220px, 360px) 1fr;
      gap: 44px;
      align-items: center;
    }

    .hero-logo {
      width: 100%;
      aspect-ratio: 1;
      object-fit: contain;
      background: rgba(255, 255, 255, 0.86);
      border: 1px solid var(--line);
      padding: 28px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: clamp(40px, 7vw, 82px);
      line-height: 0.98;
      font-weight: 760;
    }

    .subtitle {
      max-width: 760px;
      margin: 0;
      color: var(--muted);
      font-size: 19px;
      line-height: 1.6;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 56px;
    }

    section {
      margin-top: 44px;
    }

    .section-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-size: 25px;
      line-height: 1.2;
    }

    .note {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 18px;
      margin-top: 18px;
    }

    figure {
      margin: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      overflow: hidden;
    }

    figure img {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: contain;
      background: #fff;
    }

    .visual img {
      object-fit: cover;
    }

    .tall img {
      aspect-ratio: 3 / 4;
      object-fit: contain;
    }

    figcaption {
      min-height: 44px;
      padding: 12px 14px;
      color: var(--muted);
      font-size: 14px;
      border-top: 1px solid var(--line);
    }

    footer {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      border-top: 1px solid var(--line);
      background: #fff;
    }

    @media (max-width: 760px) {
      header {
        min-height: auto;
      }

      .hero {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .hero-logo {
        max-width: 280px;
      }

      .section-head {
        display: block;
      }

      .note {
        margin-top: 8px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="hero">
      <img class="hero-logo" src="assets/logo-transparent.png" alt="欧米茄九 Omega 9 logo">
      <div>
        <h1>欧米茄九<br>Omega 9</h1>
        <p class="subtitle">品牌资产快速页。当前版本保留主 logo 透明底/白底两版，并加入一张真实产品白底照片；产品图只做裁切和白底整理，没有 AI 重绘。</p>
      </div>
    </div>
  </header>

  <main>
    <section>
      <div class="section-head">
        <h2>Logo Assets</h2>
        <p class="note">只使用当前主标识，不混入备用或旧版 logo</p>
      </div>
      <div class="grid">
        <figure>
          <img src="assets/logo-transparent.png" alt="欧米茄九透明底 logo">
          <figcaption>主 logo · 透明底</figcaption>
        </figure>
        <figure>
          <img src="assets/logo-white.png" alt="欧米茄九白底 logo">
          <figcaption>主 logo · 白底</figcaption>
        </figure>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2>Real Product Photo</h2>
        <p class="note">真实产品图，仅裁切与白底整理</p>
      </div>
      <div class="grid">
        <figure class="tall">
          <img src="assets/real-product-white.png" alt="欧米茄九真实产品白底照片">
          <figcaption>真实产品白底照片</figcaption>
        </figure>
      </div>
    </section>

  </main>

  <footer>Omega 9 Brand Assets · Built for Pomelli ingestion</footer>
</body>
</html>
